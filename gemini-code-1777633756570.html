<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Cycle Calculator - Wake Up Refreshed</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
        p { font-size: 0.9rem; color: #94a3b8; }
        input { padding: 10px; border-radius: 6px; border: none; width: 100%; margin-top: 10px; font-size: 1rem; box-sizing: border-box; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #7dd3fc; }
        #results { margin-top: 20px; display: none; }
        .time-slot { display: inline-block; background: #334155; padding: 8px 12px; margin: 5px; border-radius: 4px; font-weight: bold; color: #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <h1>Sleep Calculator</h1>
    <p>If you want to wake up at:</p>
    <input type="time" id="wakeTime" value="07:00">
    <button onclick="calculateSleep()">Calculate Sleep Times</button>

    <div id="results">
        <p>To wake up refreshed, try to go to bed at:</p>
        <div id="times"></div>
        <p style="font-size: 0.7rem; margin-top: 15px;">*It takes humans an average of 14 minutes to fall asleep.</p>
    </div>
</div>

<script>
    function calculateSleep() {
        const wakeTime = document.getElementById('wakeTime').value;
        const [hours, minutes] = wakeTime.split(':');
        let date = new Date();
        date.setHours(hours, minutes, 0);

        let timesDiv = document.getElementById('times');
        timesDiv.innerHTML = '';
        
        // Calculate 6, 5, and 4 sleep cycles (90 mins each)
        const cycles = [6, 5, 4];
        
        cycles.forEach(cycle => {
            let sleepTime = new Date(date.getTime() - (cycle * 90 * 60000) - (14 * 60000));
            let timeString = sleepTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            timesDiv.innerHTML += `<span class="time-slot">${timeString}</span>`;
        });

        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
